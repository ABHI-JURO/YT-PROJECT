<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox practice</title>
    </head>
    <body style="padding-bottom: 1000px;">
        <div style="display: flex;
          flex-direction: row;">
          <div style="background-color: rgb(128, 0, 255);
                   width: 100px;">
            div 3</div> 
        <div style="background-color: aqua;
                   flex: 1;">
            div 1</div>
        <div style="background-color: lightcoral;
                   flex: 2;">
            div 2</div>
        </div>

        <div style="display: flex;
          flex-direction: row;
          justify-content: center;

          margin-top: 30px;
          height: 70px;
          border-style: solid;
          border-width: 1px;
          border-color: black;">
          <div style="background-color: rgb(128, 0, 255);
                   width: 100px;">
            div 1</div> 
        <div style="background-color: aqua;
                   width: 100px;">
            div 2</div>
        <div style="background-color: lightcoral;
                   width: 100px;">
            div 3</div>
        </div>

        <div style="display: flex;
          flex-direction: row;
          justify-content: space-between;

          margin-top: 30px;
          height: 70px;
          border-style: solid;
          border-width: 1px;
          border-color: black;">
          <div style="background-color: rgb(128, 0, 255);
                   width: 100px;">
            div 1</div> 
        <div style="background-color: aqua;
                   width: 100px;">
            div 2</div>
        <div style="background-color: lightcoral;
                   width: 100px;">
            div 3</div>
        </div>

        <div style="display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;

          margin-top: 30px;
          height: 70px;
          border-style: solid;
          border-width: 1px;
          border-color: black;">
          <div style="background-color: rgb(128, 0, 255);
                   width: 100px;">
            div 1</div> 
        <div style="background-color: aqua;
                   width: 100px;">
            div 2</div>
        <div style="background-color: lightcoral;
                   width: 100px;">
            div 3</div>
        </div>
    </body>
</html>
