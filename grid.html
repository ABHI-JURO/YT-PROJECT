<!DOCTYPE html>
<html>
    <head>
        <title>GRID PRACTICE</title>
    </head>
    <body>
        <div style="display: grid;grid-template-columns: 100px 100px;">
        <div style="background-color: yellow;">grid 1</div>
        <div style="background-color: aqua;">grid 2<p>text</p></div>
        </div>

        <div style="display: grid;grid-template-columns: 100px 100px 200px; margin-top: 30px;">
        <div style="background-color: yellow;">grid 1</div>
        <div style="background-color: aqua;">grid 2<p>text</p></div>
        <div style="background-color: blueviolet;">grid 3</div>
        <div style="background-color: blue;">grid 4</div>
        </div>

        <div style="display: grid;grid-template-columns: 100px 1fr; margin-top: 30px;">
        <div style="background-color: yellow;">grid 1</div>
        <div style="background-color: aqua;">grid 2</div>
        </div>
        <div style="display: grid;grid-template-columns: 100px 1fr 1fr; margin-top: 30px;">
        <div style="background-color: yellow;">grid 1</div>
        <div style="background-color: aqua;">grid 2</div>
        <div style="background-color: rgb(255, 0, 251);">grid 3</div>
        </div>
    </body>
</html>
