<!DOCTYPE html>
<html>
    <head>
        <title>css position</title>
    </head>
    <body style="height: 3000px;
                 padding-top: 60px;
                 padding-left: 50px;">
        <div style="background-color: black;
                    color: aliceblue;
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    height: 50px;
                    z-index: 1;">
            Header
        </div>
        <div style="background-color: blueviolet;
                    color: white;
                    position: fixed;
                    left: 0;
                    bottom: 0;
                    top: 50px">
            sidebar
        </div>

        <div style="
            position:absolute;
            background-color: blue;">
            absolute
        </div>
        <div style="background-color: aqua;
                    height: 200px;
                    width: 200px;">
            div 1
        </div>
        <div style="background-color: rgb(238, 0, 255);
                    height: 200px;
                    width: 200px;">
            div 2
        </div>
    </body>
</html>
